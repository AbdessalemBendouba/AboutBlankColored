<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Page</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-family: sans-serif;
            transition: background-color 0.3s ease;
        }

        #instruction {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            user-select: none;
            pointer-events: none;
            transition: opacity 2s ease-in-out;
            padding: 20px;
        }

        /* Hidden color input */
        #colorPicker {
            position: absolute;
            visibility: hidden;
            opacity: 0;
        }
    </style>

    <script>
        // IMMEDIATE EXECUTION TO PREVENT FLASH
        (function() {
            const savedColor = localStorage.getItem('bg-color') || '#ffffff';
            
            // Apply background color immediately
            document.documentElement.style.backgroundColor = savedColor;

            // Generate Favicon Square immediately
            function updateFavicon(color) {
                const canvas = document.createElement('canvas');
                canvas.width = 32;
                canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, 32, 32);
                
                const link = document.getElementById('favicon');
                link.href = canvas.toDataURL('image/x-icon');
            }
            
            // We need to wait for the DOM to have the favicon link ready
            window.addEventListener('DOMContentLoaded', () => {
                updateFavicon(savedColor);
                applyColors(savedColor);
                
                // Start the fade out timer
                setTimeout(() => {
                    const text = document.getElementById('instruction');
                    if (text) text.style.opacity = '0';
                }, 5000);
            });

            // Helper to determine if font should be black or white based on background
            window.applyColors = function(hex) {
                document.body.style.backgroundColor = hex;
                
                // Calculate contrast
                const r = parseInt(hex.substring(1, 3), 16);
                const g = parseInt(hex.substring(3, 5), 16);
                const b = parseInt(hex.substring(5, 7), 16);
                const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                const textColor = (yiq >= 128) ? 'rgba(0, 0, 0, 0.25)' : 'rgba(255, 255, 255, 0.25)';
                
                const textElement = document.getElementById('instruction');
                if (textElement) {
                    textElement.style.color = textColor;
                }
                
                updateFavicon(hex);
                localStorage.setItem('bg-color', hex);
            };
        })();
    </script>
</head>
<body>

    <div id="instruction">Click the screen to change background color</div>

    <!-- The native color picker allows both visual selection and Hex input -->
    <input type="color" id="colorPicker">

    <script>
        const picker = document.getElementById('colorPicker');
        const savedColor = localStorage.getItem('bg-color') || '#ffffff';
        picker.value = savedColor;

        // Open picker on body click
        document.body.addEventListener('click', (e) => {
            // Prevent triggering if clicking specific UI elements (though there are none here)
            picker.click();
        });

        // Update when user picks a color
        picker.addEventListener('input', (e) => {
            applyColors(e.target.value);
        });

        // Ensure current state matches picker on final change
        picker.addEventListener('change', (e) => {
            applyColors(e.target.value);
        });
    </script>
</body>
</html>
